version: '3.8'

services:
  app_bahy:
    build: .
    image: laravel_parkir_bahy
    networks:
      - parkir_net_bahy
    volumes:
      - parkir_data_bahy:/var/www

  db_bahy:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: db_parkir_bahy
      MYSQL_ROOT_PASSWORD: rahasia_bahy
    volumes:
      - dbdata_bahy:/var/lib/mysql
    networks:
      - parkir_net_bahy

  nginx_bahy:
    image: nginx:latest
    ports:
      - "8001-8003:80"
    volumes:
      - parkir_data_bahy:/var/www:ro
      - ./nginx-bahy.conf:/etc/nginx/conf.d/default.conf
    networks:
      - parkir_net_bahy
    depends_on:
      - app_bahy

networks:
  parkir_net_bahy:
    driver: bridge

volumes:
  dbdata_bahy:
  parkir_data_bahy:
